services:
  # PostHog Go SDK adapter (capture v0)
  sdk-adapter:
    build:
      context: ..
      dockerfile: sdk_compliance_adapter/Dockerfile
    expose:
      - "8080"
    networks:
      - test-network

  # PostHog Go SDK adapter (capture v1)
  sdk-adapter-v1:
    build:
      context: ..
      dockerfile: sdk_compliance_adapter/Dockerfile.v1
    expose:
      - "8080"
    networks:
      - test-network

  # Test harness (capture v0)
  test-harness:
    image: ghcr.io/posthog/sdk-test-harness:0.8.0
    command: ["run", "--adapter-url", "http://sdk-adapter:8080", "--mock-url", "http://test-harness:8081", "--sdk-type", "server", "--suite", "capture"]
    networks:
      - test-network
    depends_on:
      - sdk-adapter

  # Test harness (capture v1)
  test-harness-v1:
    image: ghcr.io/posthog/sdk-test-harness:0.8.0
    command: ["run", "--adapter-url", "http://sdk-adapter-v1:8080", "--mock-url", "http://test-harness-v1:8081", "--sdk-type", "server", "--suite", "capture_v1"]
    networks:
      - test-network
    depends_on:
      - sdk-adapter-v1

networks:
  test-network:
    driver: bridge
