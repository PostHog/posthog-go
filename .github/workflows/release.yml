name: "Release"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump to apply
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  resolve-release-context:
    name: Resolve release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should-release: ${{ steps.resolve.outputs.should-release }}
      bump-type: ${{ steps.resolve.outputs.bump-type }}
    steps:
      - name: Resolve release request
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          CURRENT_REF: ${{ github.ref }}
          DEFAULT_BRANCH: main
          PUSH_SHA: ${{ github.sha }}
          PUSH_HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          INPUT_BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          set -euo pipefail

          SHOULD_RELEASE=false
          BUMP_TYPE=""

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$CURRENT_REF" != "refs/heads/$DEFAULT_BRANCH" ]; then
              echo "::notice::Skipping release because workflow_dispatch must be run on $DEFAULT_BRANCH, got $CURRENT_REF."
            else
              BUMP_TYPE="$INPUT_BUMP_TYPE"
              if [ -n "$BUMP_TYPE" ]; then
                SHOULD_RELEASE=true
                echo "✓ Manual release requested on $DEFAULT_BRANCH with bump type $BUMP_TYPE"
              else
                echo "::notice::Skipping manual release because no bump type was provided."
              fi
            fi

            echo "should-release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
            echo "bump-type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${PUSH_HEAD_COMMIT_MESSAGE:-}" == *"[version bump]"* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "Bump version to "* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "chore: Release v"* || "${PUSH_HEAD_COMMIT_MESSAGE:-}" == "chore: release "* ]]; then
            echo "::notice::Skipping release for the automated version bump commit."
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "bump-type=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PRS_JSON=$(gh api "repos/${{ github.repository }}/commits/$PUSH_SHA/pulls")
          MATCHING_PR_JSON=$(echo "$PRS_JSON" | jq -c --arg branch "$DEFAULT_BRANCH" '[.[] | select(.merged_at != null and .base.ref == $branch and (.labels | map(.name) | index("release")))] | first // {}')
          if [ "$MATCHING_PR_JSON" != "{}" ]; then
            if echo "$MATCHING_PR_JSON" | jq -e '(.labels | map(.name) | index("bump-major")) != null' >/dev/null; then
              BUMP_TYPE=major
            elif echo "$MATCHING_PR_JSON" | jq -e '(.labels | map(.name) | index("bump-minor")) != null' >/dev/null; then
              BUMP_TYPE=minor
            elif echo "$MATCHING_PR_JSON" | jq -e '(.labels | map(.name) | index("bump-patch")) != null' >/dev/null; then
              BUMP_TYPE=patch
            fi
          fi

          if [ -z "$BUMP_TYPE" ]; then
            ASSOCIATED_PRS=$(echo "$PRS_JSON" | jq -r '[.[].number | tostring] | join(", ")')
            if [ -n "$ASSOCIATED_PRS" ]; then
              echo "::notice::Skipping release because push $PUSH_SHA is associated with PR(s) [$ASSOCIATED_PRS], but none currently have the release label with a bump label."
            else
              echo "::notice::Skipping release because push $PUSH_SHA is not associated with a merged PR to $DEFAULT_BRANCH that has the release label and a bump label."
            fi
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "bump-type=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_PR=$(echo "$MATCHING_PR_JSON" | jq -r '"#\(.number)"')
          echo "✓ Release requested by push $PUSH_SHA via $RELEASE_PR with bump type $BUMP_TYPE"
          echo "should-release=true" >> "$GITHUB_OUTPUT"
          echo "bump-type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

  check-release-label:
    name: Check for release label
    needs: resolve-release-context
    runs-on: ubuntu-latest
    # Run when PR with 'release' label is merged to main, or when manually triggered
    if: needs.resolve-release-context.outputs.should-release == 'true'
    outputs:
      should-release: ${{ steps.check.outputs.should-release }}
      bump-type: ${{ steps.check.outputs.bump-type }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Check release conditions
        id: check
        env:
          BUMP_TYPE: ${{ needs.resolve-release-context.outputs.bump-type }}
        run: |
          if [ -n "$BUMP_TYPE" ]; then
            echo "bump-type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "Release requested with bump type $BUMP_TYPE"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          fi
  notify-approval-needed:
    name: Notify Slack - Approval Needed
    needs: check-release-label
    if: needs.check-release-label.outputs.should-release == 'true'
    uses: posthog/.github/.github/workflows/notify-approval-needed.yml@main
    with:
      slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
      slack_user_group_id: ${{ vars.GROUP_CLIENT_LIBRARIES_SLACK_GROUP_ID }}
    secrets:
      slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
      posthog_project_api_key: ${{ secrets.POSTHOG_PROJECT_API_KEY }}

  release:
    name: Bump versions and release
    needs: [resolve-release-context, check-release-label, notify-approval-needed]
    runs-on: ubuntu-latest
    # Use `always()` to ensure the job runs even if the check-release-label job fails
    # but still depend on it to be able to use `needs.notify-approval-needed.outputs.slack_ts`
    if: always() && needs.resolve-release-context.outputs.should-release == 'true' && needs.check-release-label.outputs.should-release == 'true'
    environment: "Release" # This will require an approval from a maintainer, they are notified in Slack above
    permissions:
      contents: write
      actions: write
      id-token: write
    steps:
      - name: Notify Slack - Approved
        if: needs.notify-approval-needed.outputs.slack_ts != ''
        uses: posthog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "✅ Release approved! Version bump in progress..."
          emoji_reaction: "white_check_mark"

      - name: Get GitHub App token
        id: releaser
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_POSTHOG_GO_RELEASER_APP_ID }}
          private-key: ${{ secrets.GH_APP_POSTHOG_GO_RELEASER_PRIVATE_KEY }} # Secrets available only inside the 'Release' environment, requires approval from a maintainer

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.releaser.outputs.token }}

      - name: Bump version
        id: bump-version
        run: |
          current_version=$(grep -oP 'const Version = "\K[^"]+' version.go)
          IFS='.' read -ra version_parts <<< "$current_version"
          major=${version_parts[0]}
          minor=${version_parts[1]}
          patch=${version_parts[2]}

          if [ "${{ needs.check-release-label.outputs.bump-type }}" == "major" ]; then
            new_version="$((major + 1)).0.0"
          elif [ "${{ needs.check-release-label.outputs.bump-type }}" == "minor" ]; then
            new_version="$major.$((minor + 1)).0"
          else
            new_version="$major.$minor.$((patch + 1))"
          fi

          sed -i "s/const Version = \"$current_version\"/const Version = \"$new_version\"/" version.go
          echo "current_version=$current_version" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        env:
          CURRENT_VERSION: ${{ steps.bump-version.outputs.current_version }}
          NEW_VERSION: ${{ steps.bump-version.outputs.new_version }}
        run: |
          release_date=$(date +%Y-%m-%d)
          echo -e "## $NEW_VERSION - $release_date\n\n* [Full Changelog](https://github.com/PostHog/posthog-go/compare/${CURRENT_VERSION}...${NEW_VERSION})\n\n$(cat CHANGELOG.md)" > CHANGELOG.md

      - name: Commit version bump
        id: commit-version-bump
        uses: planetscale/ghcommit-action@25309d8005ac7c3bcd61d3fe19b69e0fe47dbdde # v0.2.20
        with:
          commit_message: "chore: bump version to ${{ steps.bump-version.outputs.new_version }} [version bump]"
          repo: ${{ github.repository }}
          branch: main
        env:
          GITHUB_TOKEN: ${{ steps.releaser.outputs.token }}

      - name: Create and push tag
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEW_VERSION: ${{ steps.bump-version.outputs.new_version }}
          COMMIT_HASH: ${{ steps.commit-version-bump.outputs.commit-hash }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/git/refs" \
            -f "ref=refs/tags/${NEW_VERSION}" \
            -f "sha=${COMMIT_HASH}"

      - name: Create GitHub release
        if: steps.commit-version-bump.outputs.commit-hash != ''
        env:
          GH_TOKEN: ${{ steps.releaser.outputs.token }}
          NEW_VERSION: ${{ steps.bump-version.outputs.new_version }}
        run: |
          CHANGELOG_ENTRY=$(awk -v defText="see CHANGELOG.md" '/^## /{if (flag) exit; flag=1} flag && /^##$/{exit} flag; END{if (!flag) print defText}' CHANGELOG.md)
          gh release create "${NEW_VERSION}" --title "${NEW_VERSION}" --notes "$CHANGELOG_ENTRY"

      # Notify in case of a failure
      - name: Send failure event to PostHog
        if: ${{ failure() }}
        uses: PostHog/posthog-github-action@v1
        with:
          posthog-token: "${{ secrets.POSTHOG_PROJECT_API_KEY }}"
          event: "posthog-go-github-release-workflow-failure"
          properties: >-
            {
              "commitSha": "${{ github.sha }}",
              "jobStatus": "${{ job.status }}",
              "ref": "${{ github.ref }}",
              "version": "${{ steps.bump-version.outputs.new_version }}"
            }

      - name: Notify Slack - Failed
        if: ${{ failure() && needs.notify-approval-needed.outputs.slack_ts != '' }}
        uses: posthog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "❌ Failed to release `posthog-go@${{ steps.bump-version.outputs.new_version }}`! <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          emoji_reaction: "x"

  notify-rejected:
    name: Notify Slack - Rejected
    needs: [release, notify-approval-needed]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'failure' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Check for rejection
        id: check-rejection
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          RESPONSE=$(gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/approvals")
          REJECTED=$(echo "$RESPONSE" | jq '[.[] | select(.state == "rejected")] | length')
          if [ "$REJECTED" -gt 0 ]; then
            echo "was_rejected=true" >> "$GITHUB_OUTPUT"
            COMMENT=$(echo "$RESPONSE" | jq -r '.[] | select(.state == "rejected") | .comment // empty' | head -1)
            if [ -n "$COMMENT" ]; then
              {
                echo 'message<<EOF'
                echo "🚫 Release was rejected: $COMMENT"
                echo 'EOF'
              } >> "$GITHUB_OUTPUT"
            else
              echo "message=🚫 Release was rejected." >> "$GITHUB_OUTPUT"
            fi
          else
            echo "was_rejected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack - Rejected
        if: steps.check-rejection.outputs.was_rejected == 'true'
        continue-on-error: true
        uses: PostHog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: '${{ steps.check-rejection.outputs.message }}'
          emoji_reaction: 'no_entry_sign'

  notify-released:
    name: Notify Slack - Released
    needs: [notify-approval-needed, release]
    runs-on: ubuntu-latest
    if: always() && needs.release.result == 'success' && needs.notify-approval-needed.outputs.slack_ts != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Notify Slack - Released
        uses: posthog/.github/.github/actions/slack-thread-reply@main
        with:
          slack_bot_token: ${{ secrets.SLACK_CLIENT_LIBRARIES_BOT_TOKEN }}
          slack_channel_id: ${{ vars.SLACK_APPROVALS_CLIENT_LIBRARIES_CHANNEL_ID }}
          thread_ts: ${{ needs.notify-approval-needed.outputs.slack_ts }}
          message: "🚀 posthog-go released successfully!"
          emoji_reaction: "rocket"
